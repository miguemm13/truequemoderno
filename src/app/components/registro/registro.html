<div class="login-shell">
  <div class="login-card">
    
    <div class="login-brand">
      <div class="brand-text">
        <h1>Trueque<span>Moderno</span></h1>
        <p>Regístrate para comenzar los trueques en tu comunidad</p>

      </div>      
      <img src="assets/logoTruqueModerno.png" alt="Logo Trueque Moderno" class="login-logo">     
      </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nombre completo</label>
        <input
          id="name"
          type="text"
          name="name"
          [(ngModel)]="name"
          placeholder="Ej. Ana Osorio"
          required>
      </div>

      <div class="form-group">
        <label for="email">Correo</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="ana.osorio@ucab.edu.ve"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Contraseña segura"
          required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input
          id="confirmPassword"
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Repite la contraseña"
          required>
      </div>


      <div class="form-group">
          <label for="telefono">Número de teléfono</label>
          <input
            id="telefono"
            type="tel"
            name="telefono"
            [(ngModel)]="telefono"
            placeholder="0412-1234567"
            required>
        </div>



      <div class="form-group">
        <label for="preguntaSeguridad">Pregunta de seguridad</label>
        <select
          id="preguntaSeguridad"
          name="preguntaSeguridad"
          [(ngModel)]="preguntaSeguridad"
          required>
          <option value="" disabled selected>Selecciona una pregunta</option>
          <option value="¿Cuál es el nombre de tu primera mascota?">¿Cuál es el nombre de tu primera mascota?</option>
          <option value="¿En qué ciudad naciste?">¿En qué ciudad naciste?</option>
          <option value="¿Cuál es el nombre de tu escuela primaria?">¿Cuál es el nombre de tu escuela primaria?</option>
          <option value="¿Cuál es tu comida favorita?">¿Cuál es tu comida favorita?</option>
          <option value="¿Cuál es el nombre de soltera de tu madre?">¿Cuál es el nombre de soltera de tu madre?</option>
        </select>
      </div>

      <div class="form-group">
        <label for="respuestaSeguridad">Respuesta de seguridad</label>
        <input
          id="respuestaSeguridad"
          type="password"
          name="respuestaSeguridad"
          [(ngModel)]="respuestaSeguridad"
          placeholder="Tu respuesta"
          required>
      </div>

      <div *ngIf="errorMessage" class="form-error">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-primary login-btn">Crear Cuenta</button>

      <div class="login-register">
        <span>¿Ya tienes cuenta?</span>
        <a [routerLink]="['/login']">Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
