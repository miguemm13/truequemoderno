<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">  
      <h1>Trueque<span>Moderno</span></h1>
      <img src="assets/logoTruqueModerno1.png" alt="Logo Trueque Moderno" class="login-logo">
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="ana.osorio@ucab.edu.ve"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Contraseña segura"
          required>
      </div>

      <div *ngIf="errorMessage" class="form-error">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-primary login-btn">Iniciar Sesión</button>

      <div class="login-forgot">
        <a [routerLink]="['/forgot-password']">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="login-register">
        <span>¿No tienes cuenta?</span>
        <a [routerLink]="['/registro']">Regístrate</a>
      </div>


    </form>
  </div>
</div>
