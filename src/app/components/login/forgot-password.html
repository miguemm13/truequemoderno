<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <h1>Trueque<span>Moderno</span></h1>
      <p>Recupera tu contraseña ingresando tu correo y una nueva clave segura.</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <!-- Paso 1: Correo -->
      <div class="form-group">
        <label for="email">Correo</label>
        <div style="display: flex; gap: 8px;">
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="ana.osorio@ucab.edu.ve"
            [disabled]="preguntaObtenida"
            required
            style="flex: 1;">
          <button type="button" class="btn btn-secondary" (click)="buscarPregunta()" *ngIf="!preguntaObtenida">Buscar</button>
        </div>
      </div>

      <!-- Paso 2: Pregunta, Respuesta y Nueva Contraseña -->
      <div *ngIf="preguntaObtenida">
        <div class="form-group">
          <label>Pregunta de Seguridad</label>
          <div style="background: var(--bg-fondo); padding: 10px; border-radius: 6px; font-weight: 600; color: var(--texto-principal); font-size: 0.9rem;">
            {{ preguntaSeguridad }}
          </div>
        </div>

        <div class="form-group">
          <label for="respuestaSeguridad">Tu Respuesta</label>
          <input
            id="respuestaSeguridad"
            type="password"
            name="respuestaSeguridad"
            [(ngModel)]="respuestaSeguridad"
            placeholder="Ingresa tu respuesta secreta"
            required>
        </div>

        <div class="form-group">
          <label for="newPassword">Nueva contraseña</label>
          <input
            id="newPassword"
            type="password"
            name="newPassword"
            [(ngModel)]="newPassword"
            placeholder="Mínimo 6 caracteres"
            required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar nueva contraseña</label>
          <input
            id="confirmPassword"
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Repite la nueva contraseña"
            required>
        </div>
      </div>

      <div *ngIf="errorMessage" class="form-error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="form-success">{{ successMessage }}</div>

      <button type="submit" class="btn btn-primary login-btn" *ngIf="preguntaObtenida">Restablecer contraseña</button>

      <div class="login-register">
        <span>¿Recordaste tu contraseña?</span>
        <a [routerLink]="['/login']">Volver a iniciar sesión</a>
      </div>
    </form>
  </div>
</div>
